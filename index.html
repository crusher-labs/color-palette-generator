    <style>
        body { font-family: 'Inter', sans-serif; }
        .tool-mono { font-family: 'JetBrains Mono', monospace; }
        .tool-card {
            max-width: 42rem;
            margin-inline: auto;
            padding: var(--crusher-spacing-6);
            display: grid;
            gap: var(--crusher-spacing-6);
        }
        .tool-color-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--crusher-spacing-4);
        }
        .tool-color-picker {
            inline-size: 6rem;
            block-size: 4rem;
            padding: 0;
            border: 0;
            border-radius: var(--crusher-radius-md);
            background: transparent;
            cursor: pointer;
        }
        .tool-hex {
            inline-size: 8rem;
            text-align: center;
        }
        .tool-mode-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: var(--crusher-spacing-2);
        }
        .tool-mode-btn {
            padding-inline: var(--crusher-spacing-4);
            padding-block: var(--crusher-spacing-1);
            border-radius: var(--crusher-radius-full);
            border: 1px solid var(--crusher-border-primary);
            background: transparent;
            color: var(--crusher-text-primary);
            font-size: var(--crusher-font-size-sm);
            cursor: pointer;
            transition: border-color 0.15s ease, background-color 0.15s ease;
        }
        .tool-mode-btn:hover,
        .tool-mode-btn[aria-pressed="true"] {
            border-color: var(--crusher-color-brand-primary);
            background: color-mix(in srgb, var(--crusher-color-brand-primary) 12%, transparent);
        }
        .tool-palette {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: var(--crusher-spacing-2);
            min-block-size: 6.5rem;
        }
        .tool-swatch {
            block-size: 4rem;
            border-radius: var(--crusher-radius-lg);
            box-shadow: var(--crusher-shadow-md);
            cursor: pointer;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: var(--crusher-spacing-2);
            font-family: 'JetBrains Mono', monospace;
            font-size: var(--crusher-font-size-xs);
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.45);
            transition: transform 0.2s ease;
        }
        .tool-swatch:hover { transform: scale(1.05); }
    </style>
</head>
<body class="crusher-tool-page">
    <main class="crusher-tool-shell">
        <header class="crusher-tool-header">
            <h1 class="crusher-tool-title">Color Palette Generator</h1>
            <p class="crusher-tool-lede">Generate color schemes from a base color.</p>
        </header>

        <section class="crusher-tool-surface tool-card">
            <div class="tool-color-row">
                <input type="color" id="base-color" value="#0ea5e9" class="tool-color-picker">
                <input type="text" id="hex-input" value="#0ea5e9" class="crusher-tool-control tool-mono tool-hex">
            </div>
            <div class="tool-mode-row">
                <button id="comp-btn" type="button" class="tool-mode-btn">Complementary</button>
                <button id="analog-btn" type="button" class="tool-mode-btn">Analogous</button>
                <button id="triad-btn" type="button" class="tool-mode-btn">Triadic</button>
            </div>
            <div id="palette" class="tool-palette"></div>
        </section>
    </main>

    <a href="https://tools.muhammadhassaanjaved.com/" id="hub-bubble" class="crusher-tool-fab" title="View All Tools" target="_blank" rel="noopener noreferrer">

            <rect x="3" y="3" width="7" height="7"></rect>
            <rect x="14" y="3" width="7" height="7"></rect>

        </svg>

    <crusher-style-switcher
      default-theme="minimal"
      default-brand="#0ea5e9"
      hide-themes
      hide-theme-color>
        <svg slot="mode-light-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 512 512" fill="currentColor" aria-hidden="true"><path d="M361.5 1.2c5 2.1 8.6 6.6 9.6 11.9L391 121l107.9 19.8c5.3 1 9.8 4.6 11.9 9.6s1.5 10.7-1.6 15.2L446.9 256l62.3 90.3c3.1 4.5 3.7 10.2 1.6 15.2s-6.6 8.6-11.9 9.6L391 391 371.1 498.9c-1 5.3-4.6 9.8-9.6 11.9s-10.7 1.5-15.2-1.6L256 446.9l-90.3 62.3c-4.5 3.1-10.2 3.7-15.2 1.6s-8.6-6.6-9.6-11.9L121 391 13.1 371.1c-5.3-1-9.8-4.6-11.9-9.6s-1.5-10.7 1.6-15.2L65.1 256 2.8 165.7c-3.1-4.5-3.7-10.2-1.6-15.2s6.6-8.6 11.9-9.6L121 121 140.9 13.1c1-5.3 4.6-9.8 9.6-11.9s10.7-1.5 15.2 1.6L256 65.1 346.3 2.8c4.5-3.1 10.2-3.7 15.2-1.6zM160 256a96 96 0 1 1 192 0 96 96 0 1 1 -192 0zm224 0a128 128 0 1 0 -256 0 128 128 0 1 0 256 0z"/></svg>
        <svg slot="mode-dark-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 384 512" fill="currentColor" aria-hidden="true"><path d="M223.5 32C100 32 0 132.3 0 256S100 480 223.5 480c60.6 0 115.5-24.2 155.8-63.4c5-4.9 6.3-12.5 3.1-18.7s-10.1-9.7-17-8.5c-9.8 1.7-19.8 2.6-30.1 2.6c-96.9 0-175.5-78.8-175.5-176c0-65.8 36-123.1 89.3-153.3c6.1-3.5 9.2-10.5 7.7-17.3s-7.3-11.9-14.3-12.5c-6.3-.5-12.6-.8-19-.8z"/></svg>
    </crusher-style-switcher>
    <script type="module" src="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/crusher-ui.standalone.esm.js" integrity="sha384-RkuNGzCebUwZ5RZDFSKGQ7sDaUpdPfDxO088yXDMPM5CvJ4eBy2Jf/UhLwGay/4K" crossorigin="anonymous"></script>

    <script>
        const hexToHSL = (H) => {
            let r = 0, g = 0, b = 0;
            if (H.length == 4) { r = "0x" + H[1] + H[1]; g = "0x" + H[2] + H[2]; b = "0x" + H[3] + H[3]; }
            else if (H.length == 7) { r = "0x" + H[1] + H[2]; g = "0x" + H[3] + H[4]; b = "0x" + H[5] + H[6]; }
            r /= 255; g /= 255; b /= 255;
            let cmin = Math.min(r,g,b), cmax = Math.max(r,g,b), delta = cmax - cmin;
            let h = 0, s = 0, l = 0;
            if (delta == 0) h = 0;
            else if (cmax == r) h = ((g - b) / delta) % 6;
            else if (cmax == g) h = (b - r) / delta + 2;
            else h = (r - g) / delta + 4;
            h = Math.round(h * 60);
            if (h < 0) h += 360;
            l = (cmax + cmin) / 2;
            s = delta == 0 ? 0 : delta / (1 - Math.abs(2 * l - 1));
            s = +(s * 100).toFixed(1);
            l = +(l * 100).toFixed(1);
            return { h, s, l };
        }

        const hslToHex = (h, s, l) => {
            s /= 100; l /= 100;
            let c = (1 - Math.abs(2 * l - 1)) * s, x = c * (1 - Math.abs((h / 60) % 2 - 1)), m = l - c / 2, r = 0, g = 0, b = 0;
            if (0 <= h && h < 60) { r = c; g = x; b = 0; }
            else if (60 <= h && h < 120) { r = x; g = c; b = 0; }
            else if (120 <= h && h < 180) { r = 0; g = c; b = x; }
            else if (180 <= h && h < 240) { r = 0; g = x; b = c; }
            else if (240 <= h && h < 300) { r = x; g = 0; b = c; }
            else if (300 <= h && h < 360) { r = c; g = 0; b = x; }
            r = Math.round((r + m) * 255).toString(16);
            g = Math.round((g + m) * 255).toString(16);
            b = Math.round((b + m) * 255).toString(16);
            if (r.length == 1) r = "0" + r;
            if (g.length == 1) g = "0" + g;
            if (b.length == 1) b = "0" + b;
            return "#" + r + g + b;
        }

        const baseColor = document.getElementById('base-color');
        const hexInput = document.getElementById('hex-input');
        const paletteEl = document.getElementById('palette');
        const modeButtons = {
            comp: document.getElementById('comp-btn'),
            analog: document.getElementById('analog-btn'),
            triad: document.getElementById('triad-btn')
        };
        let activeType = 'comp';

        baseColor.addEventListener('input', () => { hexInput.value = baseColor.value; generate(activeType); });
        hexInput.addEventListener('change', () => { baseColor.value = hexInput.value; generate(activeType); });

        function renderSwatches(colors) {
            while (paletteEl.firstChild) paletteEl.removeChild(paletteEl.firstChild);
            colors.forEach(c => {
                const swatch = document.createElement('div');
                swatch.className = 'tool-swatch';
                swatch.style.backgroundColor = c;
                swatch.textContent = c;
                swatch.addEventListener('click', async () => {
                    try {
                        await navigator.clipboard.writeText(c);
                    } catch {
                        const dummy = document.createElement('textarea');
                        document.body.appendChild(dummy);
                        dummy.value = c;
                        dummy.select();
                        document.execCommand('copy');
                        document.body.removeChild(dummy);
                    }
                    swatch.textContent = 'Copied!';
                    setTimeout(() => { swatch.textContent = c; }, 1000);
                });
                paletteEl.appendChild(swatch);
            });
        }

        function setActiveMode(type) {
            activeType = type;
            Object.entries(modeButtons).forEach(([key, btn]) => {
                btn.setAttribute('aria-pressed', String(key === type));
            });
        }

        function generate(type) {
            setActiveMode(type);
            const {h, s, l} = hexToHSL(baseColor.value);
            const colors = [];
            if (type === 'comp') {
                colors.push(hslToHex(h, s, l));
                colors.push(hslToHex((h + 180) % 360, s, l));
            } else if (type === 'analog') {
                colors.push(hslToHex(h, s, l));
                colors.push(hslToHex((h + 30) % 360, s, l));
                colors.push(hslToHex((h + 60) % 360, s, l));
                colors.push(hslToHex((h - 30 + 360) % 360, s, l));
                colors.push(hslToHex((h - 60 + 360) % 360, s, l));
            } else if (type === 'triad') {
                colors.push(hslToHex(h, s, l));
                colors.push(hslToHex((h + 120) % 360, s, l));
                colors.push(hslToHex((h + 240) % 360, s, l));
                colors.push(hslToHex((h + 60) % 360, s, l));
                colors.push(hslToHex((h + 180) % 360, s, l));
            }
            renderSwatches(colors);
        }

        modeButtons.comp.addEventListener('click', () => generate('comp'));
        modeButtons.analog.addEventListener('click', () => generate('analog'));
        modeButtons.triad.addEventListener('click', () => generate('triad'));

        generate('comp');
    </script>
</body>
</html>
